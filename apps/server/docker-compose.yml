services:
  socia-server:
    build:
      # Build context is apps/ — this is the pnpm workspace for extensions,
      # server and shared packages. web/ and infra/ stay outside the image.
      context: ..
      dockerfile: server/Dockerfile
    container_name: socia-server
    restart: unless-stopped
    ports:
      - "4318:4317"
    environment:
      PORT: 4317
      DATA_DIR: /data
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASS: ${ADMIN_PASS:-changeme}
      SESSION_SECRET: ${SESSION_SECRET:-change-this-please-to-a-long-random-string}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL_HINTS: ${OPENROUTER_MODEL_HINTS:-xiaomi/mimo-v2-flash}
      OPENROUTER_MODEL_EVAL: ${OPENROUTER_MODEL_EVAL:-xiaomi/mimo-v2-flash}
      BRAND_ID: ${BRAND_ID:-}
    volumes:
      - socia-data:/data

volumes:
  socia-data:
