<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="url(#bg)"/>

  <!-- Record button (outer ring) -->
  <circle cx="64" cy="64" r="36" fill="none" stroke="#fff" stroke-width="4"/>

  <!-- Record dot -->
  <circle cx="64" cy="64" r="20" fill="#ef4444"/>

  <!-- Play/teach indicator -->
  <polygon points="58,52 58,76 78,64" fill="#fff"/>
</svg>
