<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VPN · Jornadas Formativas SOCIA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;900&family=Barlow+Condensed:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #242d3d;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Nunito', 'Arial Black', sans-serif;
      overflow: hidden;
      position: relative;
    }

    .wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-evenly;
      min-height: 100vh;
      z-index: 1;
      padding: 4vh 2rem;
    }

    /* ── Cabecera ── */
    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
    }
    .socia {
      font-family: 'Nunito', sans-serif;
      font-size: clamp(4rem, 12vw, 9rem);
      font-weight: 900;
      color: transparent;
      -webkit-text-stroke: 4px #ffffff;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      line-height: 1;
    }
    .tagline {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(0.9rem, 2.4vw, 1.4rem);
      font-weight: 700;
      color: #eb114b;
      letter-spacing: 0.28em;
      text-transform: uppercase;
    }

    /* ── QR ── */
    .qr-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .ring {
      position: absolute;
      border-radius: 18px;
      border: 3px solid #eb114b;
      animation: pulse 2.8s ease-in-out infinite;
    }
    .ring-1 { inset: -14px; }
    .ring-2 { inset: -28px; border-width: 1.5px; border-color: rgba(235,17,75,0.25);
               animation-delay: 0.7s; }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.35; transform: scale(1.015); }
    }
    .qr-code {
      display: block;
      width:  clamp(240px, 38vh, 420px);
      height: clamp(240px, 38vh, 420px);
      background: white;
      border-radius: 14px;
      padding: 10px;
    }

    /* ── Mensaje ── */
    .msg {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }
    .msg-main {
      font-family: 'Nunito', sans-serif;
      font-size: clamp(1.3rem, 3.5vw, 2.2rem);
      font-weight: 900;
      color: white;
      letter-spacing: 0.02em;
    }
    .msg-main em { color: #eb114b; font-style: normal; }
    .msg-sub {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(0.8rem, 1.6vw, 1rem);
      font-weight: 400;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* ── Footer ── */
    .footer {
      position: absolute;
      bottom: 1.2rem;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(0.6rem, 1.1vw, 0.75rem);
      color: rgba(255,255,255,0.15);
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }
  </style>
</head>
