# Run on every push and PR.
#
# Two independent jobs:
#   - core: apps workspace pnpm (extensions + server + packages/*).
#     Build + typecheck. This is what most contributions touch.
#   - web: only when web/ changes. Each web app installs and builds on its
#     own (web/ is outside the workspace by design).
#
# `--frozen-lockfile` (the pnpm install default) is strict: CI fails if the
# lockfile is out of sync with package.json. Anyone adding a dependency must
# commit the updated `apps/pnpm-lock.yaml`. This is the right tradeoff for an
# open-source repo where reproducibility matters more than convenience.
#
# Note on pnpm version: we let `pnpm/action-setup` read it from the
# `packageManager` field in package.json (the canonical source) instead of
# pinning it again here. Setting both is now an error in the action.

name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  core:
    name: Build core apps (extensions + server + packages)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/pnpm-lock.yaml

      - name: Install workspace dependencies
        working-directory: apps
        run: pnpm install --frozen-lockfile

      - name: Typecheck (all packages + apps)
        working-directory: apps
        run: pnpm typecheck

      - name: Build extensions
        working-directory: apps
        run: pnpm build:extensions

      - name: Build server (panel + backend)
        working-directory: apps
        run: pnpm build:server

  web:
    name: Build web (landing + docs)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # web/ is a self-contained pnpm sub-workspace.
      - name: Install web dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Build landing + docs
        working-directory: web
        run: pnpm build
