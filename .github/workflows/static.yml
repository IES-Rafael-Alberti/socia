# Build the landing + docs Astro projects and publish to GitHub Pages.
# Published at https://socia.fpciberseguridad.com/.
# Landing has no base; docs uses base "/docs".

name: Build & deploy SOCIA site

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # No `cache: npm` here: package-lock.json is .gitignored, so the
          # cache key can't be computed. CI installs are fresh each run.

      # ------------- Landing page -------------
      - name: Install landing dependencies
        working-directory: src/landing-page
        run: npm ci || npm install

      - name: Build landing
        working-directory: src/landing-page
        run: npm run build

      # ------------- Docs (Starlight) -------------
      - name: Install docs dependencies
        working-directory: src/docs
        run: npm ci || npm install

      - name: Build docs
        working-directory: src/docs
        run: npm run build

      # ------------- Assemble final site -------------
      # On the custom domain (socia.fpciberseguridad.com) the artifact root
      # IS the apex. Landing's dist/ goes flat into _site/, and the docs
      # dist/ — built with base "/docs" — goes under _site/docs/.
      - name: Assemble site
        run: |
          rm -rf _site
          mkdir -p _site/docs
          cp -R src/landing-page/dist/. _site/
          cp -R src/docs/dist/. _site/docs/
          # Custom domain — keep CNAME so GitHub Pages serves the apex.
          echo "socia.fpciberseguridad.com" > _site/CNAME

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
