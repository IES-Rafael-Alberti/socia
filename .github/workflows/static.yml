# Build the landing + docs Astro projects and publish to GitHub Pages.
# Published at https://socia.fpciberseguridad.com/.
# Landing has no base; docs uses base "/docs".
#
# These two sites live in /web/ and are intentionally OUTSIDE the pnpm
# workspace of the rest of the repo (so contributors who only care about
# extensions / server don't have to install Astro / Starlight). Each one
# is installed and built independently here.
#
# Note on pnpm version: we let `pnpm/action-setup` read it from the
# `packageManager` field in package.json instead of pinning it again here.

name: Build & deploy SOCIA site

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # web/ is a self-contained pnpm sub-workspace (own pnpm-workspace.yaml,
      # own lockfile). One install, one build for both sites.
      - name: Install web dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Build landing + docs
        working-directory: web
        run: pnpm build

      # ------------- Assemble final site -------------
      # On the custom domain (socia.fpciberseguridad.com) the artifact root
      # IS the apex. Landing's dist/ goes flat into _site/; docs dist/ —
      # built with base "/docs" — goes under _site/docs/.
      # Slides (reveal.js) go under _site/slides/.
      - name: Assemble site
        run: |
          rm -rf _site
          mkdir -p _site/docs _site/slides
          cp -R web/landing/dist/. _site/
          cp -R web/docs/dist/. _site/docs/
          # Copy reveal.js slides excluding dev dependencies
          cp -R slides/. _site/slides/
          rm -rf _site/slides/node_modules _site/slides/package.json _site/slides/package-lock.json _site/slides/gulpfile.js
          # Custom domain — keep CNAME so GitHub Pages serves the apex.
          echo "socia.fpciberseguridad.com" > _site/CNAME

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
