# Build the landing + docs Astro projects and publish to GitHub Pages.
# Published at https://ies-rafael-alberti.github.io/socia/.
# Both projects are configured with `base: "/socia"` (or "/socia/docs"),
# so we just assemble their dist/ outputs into a single _site/ root.

name: Build & deploy SOCIA site

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # No `cache: npm` here: package-lock.json is .gitignored, so the
          # cache key can't be computed. CI installs are fresh each run.

      # ------------- Landing page -------------
      - name: Install landing dependencies
        working-directory: src/landing-page
        run: npm ci || npm install

      - name: Build landing
        working-directory: src/landing-page
        run: npm run build

      # ------------- Docs (Starlight) -------------
      - name: Install docs dependencies
        working-directory: src/docs
        run: npm ci || npm install

      - name: Build docs
        working-directory: src/docs
        run: npm run build

      # ------------- Assemble final site -------------
      # Astro outputs each project's dist/ ready to be served as the
      # landing root (/socia/) or docs root (/socia/docs/). We assemble
      # them under _site/socia/ so they line up with GitHub Pages' path.
      - name: Assemble site
        run: |
          rm -rf _site
          mkdir -p _site/socia/docs
          cp -R src/landing-page/dist/. _site/socia/
          cp -R src/docs/dist/. _site/socia/docs/
          # Friendly redirect from / to /socia/
          cat > _site/index.html <<'HTML'
          <!doctype html>
          <meta charset="utf-8">
          <title>SOCIA</title>
          <meta http-equiv="refresh" content="0; url=/socia/">
          <link rel="canonical" href="/socia/">
          HTML

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
