# Build the landing + docs Astro projects and publish to GitHub Pages.
# Published at https://ies-rafael-alberti.github.io/socia/.
# Both projects are configured with `base: "/socia"` (or "/socia/docs"),
# so we just assemble their dist/ outputs into a single _site/ root.

name: Build & deploy SOCIA site

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # No `cache: npm` here: package-lock.json is .gitignored, so the
          # cache key can't be computed. CI installs are fresh each run.

      # ------------- Landing page -------------
      - name: Install landing dependencies
        working-directory: src/landing-page
        run: npm ci || npm install

      - name: Build landing
        working-directory: src/landing-page
        run: npm run build

      # ------------- Docs (Starlight) -------------
      - name: Install docs dependencies
        working-directory: src/docs
        run: npm ci || npm install

      - name: Build docs
        working-directory: src/docs
        run: npm run build

      # ------------- Assemble final site -------------
      # GitHub Pages already serves this repo at /socia/, so the artifact
      # we upload IS the /socia/ root. Landing content goes flat into
      # _site/, and the docs site goes into _site/docs/. Astro built each
      # project with the right `base`, so internal links already point at
      # /socia/... and resolve correctly.
      - name: Assemble site
        run: |
          rm -rf _site
          mkdir -p _site/docs
          cp -R src/landing-page/dist/. _site/
          cp -R src/docs/dist/. _site/docs/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
